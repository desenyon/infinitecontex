name: Feature Request
description: Suggest an improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note token budget, privacy, portability, UX, or storage constraints.
  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How should we know this is done?
